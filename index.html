tudo automatizado em um só painel. Pare de perder prazos, descontos e horas de trabalho manual.<\u002Fp>\n        <div class=\"hero-benefits\">\n          <div class=\"hero-benefit\"><span class=\"benefit-check\">✓<\u002Fspan>Consulta automática de multas por placa ou RNTRC<\u002Fdiv>\n          <div class=\"hero-benefit\"><span class=\"benefit-check\">✓<\u002Fspan>Alertas de novas multas antes de vencer o prazo<\u002Fdiv>\n          <div class=\"hero-benefit\"><span class=\"benefit-check\">✓<\u002Fspan>Recursos e indicação de condutor sem sair do painel<\u002Fdiv>\n          <div class=\"hero-benefit\"><span class=\"benefit-check\">✓<\u002Fspan>API REST documentada para integrar ao seu ERP/TMS<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"hero-actions\">\n          <button class=\"btn btn-primary btn-lg\">Consultar multas agora →<\u002Fbutton>\n          <button class=\"btn btn-outline btn-lg\">Agendar demonstração<\u002Fbutton>\n        <\u002Fdiv>\n        <div class=\"hero-stats\">\n          <div><span class=\"stat-val\"><em>800+<\u002Fem><\u002Fspan><span class=\"stat-lbl\">Órgãos integrados<\u002Fspan><\u002Fdiv>\n          <div><span class=\"stat-val\"><em>27<\u002Fem><\u002Fspan><span class=\"stat-lbl\">DETRANs conectados<\u002Fspan><\u002Fdiv>\n          <div><span class=\"stat-val\">Tempo <em>real<\u002Fem><\u002Fspan><span class=\"stat-lbl\">Monitoramento contínuo<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"hero-visual\">\n        <div class=\"hero-card\">\n          <div class=\"card-hdr\"><span class=\"card-hdr-title\">Painel ANTT — Frota<\u002Fspan><span class=\"badge-live\">Ao vivo<\u002Fspan><\u002Fdiv>\n          <div class=\"card-row\">\n            <div class=\"card-row-l\"><div class=\"card-icon ic-warn\">⚠️<\u002Fdiv><div><div class=\"card-lbl\">Multa — Excesso de velocidade<\u002Fdiv><div class=\"card-sub\">ABC-1234 · ANTT · vence em 12 dias<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <span class=\"card-val v-red\">R$ 1.955,22<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"card-row\">\n            <div class=\"card-row-l\"><div class=\"card-icon ic-ok\">✅<\u002Fdiv><div><div class=\"card-lbl\">Recurso aprovado<\u002Fdiv><div class=\"card-sub\">XYZ-5678 · ANTT · cancelado<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <span class=\"card-val v-green\">Infração cancelada<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"card-row\">\n            <div class=\"card-row-l\"><div class=\"card-icon ic-blue\">📄<\u002Fdiv><div><div class=\"card-lbl\">Condutor indicado<\u002Fdiv><div class=\"card-sub\">DEF-9012 · prazo 30 dias<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <span class=\"card-val v-blue\">Enviado<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"card-total\"><span class=\"ct-label\">Total monitorado este mês<\u002Fspan><span class=\"ct-value\">R$ 14.320,00<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Trust -->\n  <div class=\"trust-bar\">\n    <div class=\"trust-inner\"><span class=\"trust-lbl\">Usado por<\u002Fspan>\n      <div class=\"trust-logos\">\n        <span class=\"trust-name\">Sem Parar Empresas<\u002Fspan><span class=\"trust-name\">ConectCar<\u002Fspan>\n        <span class=\"trust-name\">Gringo<\u002Fspan><span class=\"trust-name\">Zul+<\u002Fspan><span class=\"trust-name\">NSTech\n<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- O que é a ANTT -->\n  <section class=\"section about\">\n    <div class=\"about-inner\">\n      <div>\n        <div class=\"tag-pill\">Sobre o órgão<\u002Fdiv>\n        <h2>O que é a ANTT?<\u002Fh2>\n        <p>A Agência Nacional de Transportes Terrestres é a autarquia federal responsável por regular, fiscalizar e controlar o transporte terrestre no Brasil — incluindo transporte rodoviário de cargas, passageiros interestaduais e ferroviário.<\u002Fp>\n        <p>Criada pela <strong>Lei nº 10.233/2001<\u002Fstrong>, a ANTT vincula-se ao Ministério dos Transportes e tem poder de autuação sobre transportadoras, operadores logísticos e veículos que trafegam em rodovias federais.<\u002Fp>\n        <p><strong>Quem é impactado:<\u002Fstrong> transportadoras, locadoras, empresas com frotas próprias e qualquer veículo em rodovias federais fiscalizadas pela ANTT.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"facts\">\n        <div class=\"fact\"><div class=\"fact-ico\">🏛️<\u002Fdiv><div><div class=\"fact-title\">Autarquia Federal<\u002Fdiv><div class=\"fact-desc\">Vinculada ao Ministério dos Transportes. Opera de forma independente com poder de fiscalização em todo o Brasil.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"fact\"><div class=\"fact-ico\">🛣️<\u002Fdiv><div><div class=\"fact-title\">75.000 km de rodovias<\u002Fdiv><div class=\"fact-desc\">Fiscaliza todas as rodovias federais concedidas e não concedidas, incluindo todas as BRs.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"fact\"><div class=\"fact-ico\">⚖️<\u002Fdiv><div><div class=\"fact-title\">Poder de autuação<\u002Fdiv><div class=\"fact-desc\">Multas de R$ 550 a R$ 10.000+, com prazo de 30 dias para defesa prévia após notificação.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"fact\"><div class=\"fact-ico\">📋<\u002Fdiv><div><div class=\"fact-title\">Legislação<\u002Fdiv><div class=\"fact-desc\">Lei nº 10.233/2001 · Resolução ANTT nº 5.000 · CTB · Código de Regulamentação do Transporte Rodoviário.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- Serviços -->\n  <section class=\"section services\">\n    <div class=\"container text-center\">\n      <div class=\"tag-pill\" style=\"justify-content:center\">O que você pode fazer<\u002Fdiv>\n      <h2>Serviços disponíveis para a ANTT<\u002Fh2>\n      <p style=\"max-width:520px;margin:12px auto 0;font-size:15px\">Todos os serviços acessíveis via API REST ou webapp — sem portais manuais.<\u002Fp>\n      <div class=\"svc-grid\">\n        <div class=\"svc-card\"><div class=\"svc-check\">✓<\u002Fdiv><div><div class=\"svc-title\">Consulta de multas<\u002Fdiv><div class=\"svc-desc\">Busca automática de todas as infrações por placa ou RNTRC.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"svc-card\"><div class=\"svc-check\">✓<\u002Fdiv><div><div class=\"svc-title\">Consulta de débitos<\u002Fdiv><div class=\"svc-desc\">Visão consolidada de débitos pendentes com valores e vencimentos.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"svc-card\"><div class=\"svc-check\">✓<\u002Fdiv><div><div class=\"svc-title\">Emissão de boleto<\u002Fdiv><div class=\"svc-desc\">Gere o DAE para pagamento de multas diretamente pelo painel.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"svc-card\"><div class=\"svc-check\">✓<\u002Fdiv><div><div class=\"svc-title\">Recurso administrativo<\u002Fdiv><div class=\"svc-desc\">Interponha defesa prévia e recursos em segunda instância.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"svc-card\"><div class=\"svc-check\">✓<\u002Fdiv><div><div class=\"svc-title\">Indicação de condutor<\u002Fdiv><div class=\"svc-desc\">Identifique o real condutor e envie eletronicamente à ANTT.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"svc-card\"><div class=\"svc-check\">✓<\u002Fdiv><div><div class=\"svc-title\">Monitoramento automático<\u002Fdiv><div class=\"svc-desc\">Alertas em tempo real quando novas multas forem registradas.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"svc-card\"><div class=\"svc-check\">✓<\u002Fdiv><div><div class=\"svc-title\">Histórico completo<\u002Fdiv><div class=\"svc-desc\">Histórico de infrações, pagamentos, recursos e conduções por veículo.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"svc-card\"><div class=\"svc-check\">✓<\u002Fdiv><div><div class=\"svc-title\">Relatórios e exportação<\u002Fdiv><div class=\"svc-desc\">Exporte PDF ou CSV para conciliação financeira e com
